<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>MyRealTrip API Test</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8dee9;
      --accent: #2652d9;
      --accent-dark: #173ca8;
      --danger: #b42318;
      --ok: #067647;
      --warn: #b54708;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
    }
    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 24px;
      line-height: 1.2;
      margin: 0 0 6px;
      letter-spacing: 0;
    }
    p { margin: 0; color: var(--muted); font-size: 14px; }
    .status {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    button {
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      min-height: 40px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dark); }
    button.secondary {
      background: #fff;
      color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr);
      gap: 16px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    h2 {
      font-size: 15px;
      margin: 0;
      letter-spacing: 0;
    }
    .endpoint {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
    pre {
      min-height: 420px;
      margin: 0;
      padding: 16px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .analysis {
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .summary {
      display: grid;
      gap: 8px;
    }
    .pill {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fbfcff;
      font-size: 13px;
    }
    .pill strong { font-size: 13px; }
    .pill.ok { border-color: #abefc6; background: #ecfdf3; color: var(--ok); }
    .pill.warn { border-color: #fedf89; background: #fffaeb; color: var(--warn); }
    .matches {
      max-height: 320px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .match {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 12px;
      word-break: break-word;
    }
    .match:last-child { border-bottom: 0; }
    .error {
      color: var(--danger);
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 12px;
      min-height: 42px;
      white-space: pre-wrap;
    }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .status { white-space: normal; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>MyRealTrip API Test</h1>
        <p>서버 API route를 통해 응답 구조만 안전하게 확인합니다.</p>
      </div>
      <div id="status" class="status">대기 중</div>
    </header>

    <div class="toolbar" aria-label="MyRealTrip API test actions">
      <button type="button" data-endpoint="/api/myrealtrip/test">환경변수 확인</button>
      <button type="button" class="secondary" data-endpoint="/api/myrealtrip/products">products 테스트</button>
      <button type="button" class="secondary" data-endpoint="/api/myrealtrip/mylink">mylink 테스트</button>
      <button type="button" class="secondary" data-endpoint="/api/myrealtrip/reservations">reservations 테스트</button>
      <button type="button" class="secondary" data-endpoint="/api/myrealtrip/revenues">revenues 테스트</button>
      <button type="button" class="secondary" data-endpoint="/api/myrealtrip/flights?status=1">flights 상태</button>
    </div>

    <div class="grid">
      <section>
        <div class="section-head">
          <h2>응답 JSON</h2>
          <span id="endpointLabel" class="endpoint">-</span>
        </div>
        <pre id="jsonOutput">{}</pre>
        <div id="errorOutput" class="error"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>응답 필드 자동 분석</h2>
          <span id="matchCount" class="endpoint">0 matches</span>
        </div>
        <div class="analysis">
          <div id="summary" class="summary"></div>
          <div id="matches" class="matches"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const KEYWORDS = [
      "flight", "air", "fare", "baseFare", "tax", "taxes", "fee", "surcharge",
      "fuel", "YQ", "YR", "currency", "totalPrice", "deeplink", "link",
      "commission", "revenue", "reservation", "product"
    ];

    const RULES = [
      {
        label: "유류할증료 분리 가능성 있음",
        keys: ["surcharge", "fuel", "YQ", "YR"],
      },
      {
        label: "항공권 가격 구조 확인 필요",
        keys: ["flight", "air", "fare", "baseFare", "tax", "taxes", "fee", "currency", "totalPrice"],
      },
      {
        label: "총액 기반 제휴 연결만 가능",
        keys: ["totalPrice", "currency"],
      },
      {
        label: "예약/수익 추적 가능",
        keys: ["reservation", "commission", "revenue"],
      },
      {
        label: "deeplink 생성 가능성 있음",
        keys: ["deeplink", "link"],
      },
    ];

    const statusEl = document.getElementById("status");
    const endpointLabel = document.getElementById("endpointLabel");
    const jsonOutput = document.getElementById("jsonOutput");
    const errorOutput = document.getElementById("errorOutput");
    const summaryEl = document.getElementById("summary");
    const matchesEl = document.getElementById("matches");
    const matchCountEl = document.getElementById("matchCount");

    document.querySelectorAll("[data-endpoint]").forEach((button) => {
      button.addEventListener("click", () => runTest(button.dataset.endpoint));
    });

    async function runTest(endpoint) {
      statusEl.textContent = "요청 중";
      endpointLabel.textContent = endpoint;
      errorOutput.textContent = "";
      jsonOutput.textContent = "{}";
      renderAnalysis([], null);

      try {
        const response = await fetch(endpoint, {
          method: "GET",
          headers: { Accept: "application/json" },
          cache: "no-store",
        });
        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch (parseError) {
          throw new Error("JSON 파싱 실패: " + parseError.message + "\n" + text.slice(0, 1000));
        }

        jsonOutput.textContent = JSON.stringify(data, null, 2);
        renderAnalysis(findKeywordFields(data), data);
        statusEl.textContent = response.ok ? "완료" : "오류 응답";

        if (!response.ok) {
          errorOutput.textContent = "HTTP " + response.status + " " + response.statusText;
        }
      } catch (error) {
        statusEl.textContent = "실패";
        errorOutput.textContent = error && error.message ? error.message : String(error);
      }
    }

    function findKeywordFields(value, path = "$", results = []) {
      if (Array.isArray(value)) {
        value.forEach((item, index) => findKeywordFields(item, path + "[" + index + "]", results));
        return results;
      }

      if (value && typeof value === "object") {
        Object.entries(value).forEach(([key, item]) => {
          const nextPath = path + "." + key;
          const keyLower = key.toLowerCase();
          const matched = KEYWORDS.filter((keyword) => keyLower.includes(keyword.toLowerCase()));

          if (matched.length) {
            results.push({
              path: nextPath,
              key,
              keywords: matched,
              sample: sampleValue(item),
            });
          }

          findKeywordFields(item, nextPath, results);
        });
      }

      return results;
    }

    function sampleValue(value) {
      if (value === null) return "null";
      if (Array.isArray(value)) return "Array(" + value.length + ")";
      if (typeof value === "object") return "Object(" + Object.keys(value).slice(0, 5).join(", ") + ")";
      return String(value).slice(0, 140);
    }

    function renderAnalysis(matches, data) {
      const found = new Set(matches.flatMap((match) => match.keywords.map((item) => item.toLowerCase())));

      summaryEl.innerHTML = "";
      RULES.forEach((rule) => {
        const hitCount = rule.keys.filter((key) => found.has(key.toLowerCase())).length;
        const div = document.createElement("div");
        div.className = "pill " + (hitCount ? "ok" : "warn");
        div.innerHTML = "<strong>" + rule.label + "</strong><span>" + hitCount + "/" + rule.keys.length + "</span>";
        summaryEl.appendChild(div);
      });

      matchCountEl.textContent = matches.length + " matches";
      matchesEl.innerHTML = "";

      if (!matches.length) {
        const empty = document.createElement("div");
        empty.className = "match";
        if (data && data.upstreamTest === false) {
          empty.textContent = "설정 확인 응답이라 분석 가능한 실제 API 데이터가 없습니다.";
        } else if (data && typeof data === "object" && Object.keys(data).length === 0) {
          empty.textContent = "빈 JSON 응답입니다. route fallback 또는 서버 로그를 확인하세요.";
        } else {
          empty.textContent = "아직 분석 가능한 키워드 필드가 없습니다.";
        }
        matchesEl.appendChild(empty);
        return;
      }

      matches.forEach((match) => {
        const div = document.createElement("div");
        div.className = "match";
        div.textContent = match.path + " = " + match.sample + " [" + match.keywords.join(", ") + "]";
        matchesEl.appendChild(div);
      });
    }
  </script>
</body>
</html>
